<h2 class="calendar-title">{{ currentMonthYear }}</h2>

<div class="calendar mt-3">

  @for (weekday of weekdays; track weekday) {
    <div class="weekday">
      {{ weekday }}
    </div>
  }

  @for (day of days; track $index) {
    <mat-card
      class="day-card"
      [class.weekend]="day.weekend"
      [class.empty]="!day.day"
      [class.dividend]="hasDividend(day)">

      @if (day.day) {

        <span class="day-number">
      {{ day.day }}
    </span>

        @if (getDividendCount(day) > 0) {
          <span class="payment-badge">
        {{ getDividendCount(day) }}
      </span>
        }

      }

    </mat-card>
  }

</div>
